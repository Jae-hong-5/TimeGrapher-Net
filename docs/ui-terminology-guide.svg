              <tr><td class="area">Health 판정</td><td class="code">WATCH — keep measuring</td><td class="code">WATCH — Keep Measuring</td></tr>
              <tr><td class="area">Health 판정</td><td class="code">ALERT — service required</td><td class="code">ALERT — Service Required</td></tr>
