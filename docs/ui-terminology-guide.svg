        </section>
        <p class="foot">Rule of thumb: 설명성이 필요한 영역은 Error Rate / Amplitude / Beat Error를 유지하고, 순시값은 Inst., 현재 선택값은 Cur. 접두어로 구분한다.</p>
      </div>
    </div>
  </foreignObject>
</svg>
