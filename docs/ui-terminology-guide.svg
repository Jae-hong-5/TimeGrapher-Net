              <tr><td class="area">Positions KPI</td><td class="code">Seq X̄ · amplitude</td><td class="code">Avg. Amplitude</td></tr>
              <tr><td class="area">Positions KPI</td><td class="code">Total beats</td><td class="code">Total Beats</td></tr>
              <tr><td class="area">Positions legend</td><td class="code">mean</td><td class="code">Mean</td></tr>
              <tr><td class="area">Positions legend</td><td class="code">min–max range</td><td class="code">Range</td></tr>
              <tr><td class="area">Positions legend</td><td class="code">accept band</td><td class="code">Band</td></tr>
              <tr><td class="area">Positions legend</td><td class="code">mean out of band</td><td class="code">Mean Out</td></tr>
              <tr><td class="area">Positions legend</td><td class="code">30+ beats</td><td class="code">30+ Beats</td></tr>
              <tr><td class="area">Positions legend</td><td class="code">collecting</td><td class="code">Collecting</td></tr>
              <tr><td class="area">위치 버튼</td><td class="code">CH, CB, 12H, 6H, 3H, 9H</td><td class="code">현재 유지</td></tr>
              <tr><td class="area">Health 토글</td><td class="code">Amp, Rate, Beat</td><td class="code">Amplitude, Error Rate, Beat Error</td></tr>
              <tr><td class="area">Health 레일</td><td class="code">DIAGNOSIS · unified</td><td class="code">Diagnosis</td></tr>
              <tr><td class="area">Health 레일</td><td class="code">LEVELS · per position vs accept band</td><td class="code">Levels</td></tr>
              <tr><td class="area">Health 레일</td><td class="code">CONSISTENCY · across positions</td><td class="code">Consistency</td></tr>
              <tr><td class="area">Health 레일</td><td class="code">Weakest</td><td class="code">현재 유지</td></tr>
              <tr><td class="area">Health Level 표</td><td class="code">POS, AMP, RATE, BEAT</td><td class="code">Amplitude, Error Rate, Beat Error</td></tr>
