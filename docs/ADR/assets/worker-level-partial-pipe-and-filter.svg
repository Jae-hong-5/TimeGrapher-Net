<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Worker-Level Partial Pipe-and-Filter</title>
  <desc id="desc">Worker-level Pipe-and-Filter flow with bounded ring buffer and latest-wins scheduler as pipes, plus synchronous Analysis worker internals.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/></marker>
    <style>
      .title{font:700 24px Arial,sans-serif;fill:#0f172a}.sub{font:13px Arial,sans-serif;fill:#475569}.label{font:700 16px Arial,sans-serif;fill:#0f172a}.small{font:12px Arial,sans-serif;fill:#64748b}.boxText{font:13px Arial,sans-serif;fill:#0f172a}.filter{fill:#e8f3ff;stroke:#2563eb;stroke-width:2}.pipe{fill:#fff7ed;stroke:#f97316;stroke-width:2}.consumer{fill:#ecfdf5;stroke:#16a34a;stroke-width:2}.stage{fill:#f8fafc;stroke:#64748b;stroke-width:1.5}.boundary{fill:#fefce8;stroke:#ca8a04;stroke-width:1.5}.line{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#arrow)}.thin{stroke:#94a3b8;stroke-width:1.7;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="48" y="58" class="title">Worker-Level Partial Pipe-and-Filter</text>
  <text x="50" y="88" class="sub">Worker-level boundaries use pipe-like connectors; Analysis worker internals remain synchronous.</text>
  <rect x="70" y="145" width="170" height="78" rx="14" class="filter"/><text x="155" y="190" class="label" text-anchor="middle">Input worker</text>
  <polygon points="330,145 480,145 500,184 480,223 330,223 310,184" class="pipe"/><text x="405" y="181" class="label" text-anchor="middle">Bounded ring</text><text x="405" y="201" class="label" text-anchor="middle">buffer</text>
  <rect x="580" y="145" width="190" height="78" rx="14" class="filter"/><text x="675" y="190" class="label" text-anchor="middle">Analysis worker</text>
  <polygon points="865,145 1035,145 1055,184 1035,223 865,223 845,184" class="pipe"/><text x="950" y="181" class="label" text-anchor="middle">Latest-wins</text><text x="950" y="201" class="label" text-anchor="middle">frame scheduler</text>
  <rect x="1130" y="145" width="170" height="78" rx="14" class="consumer"/><text x="1215" y="190" class="label" text-anchor="middle">UI/render path</text>
  <path d="M240 184 H310" class="line"/><text x="275" y="169" class="small" text-anchor="middle">concurrent</text><text x="275" y="183" class="small" text-anchor="middle">handoff</text>
  <path d="M500 184 H580" class="line"/><path d="M770 184 H845" class="line"/><text x="808" y="169" class="small" text-anchor="middle">concurrent</text><text x="808" y="183" class="small" text-anchor="middle">handoff</text>
  <path d="M1055 184 H1130" class="line"/>
  <rect x="220" y="320" width="850" height="170" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="240" y="348" class="label">Inside Analysis worker: synchronous staged chain</text>
  <rect x="265" y="390" width="120" height="50" rx="10" class="boundary"/><text x="325" y="410" class="boxText" text-anchor="middle">Audio block</text><text x="325" y="428" class="boxText" text-anchor="middle">from ring buffer</text>
  <rect x="425" y="390" width="85" height="50" rx="10" class="stage"/><text x="467" y="421" class="boxText" text-anchor="middle">HPF</text>
  <rect x="550" y="390" width="105" height="50" rx="10" class="stage"/><text x="602" y="421" class="boxText" text-anchor="middle">Envelope</text>
  <rect x="695" y="390" width="105" height="50" rx="10" class="stage"/><text x="747" y="421" class="boxText" text-anchor="middle">Detector</text>
  <rect x="840" y="390" width="120" height="50" rx="10" class="stage"/><text x="900" y="410" class="boxText" text-anchor="middle">Metrics /</text><text x="900" y="428" class="boxText" text-anchor="middle">Projectors</text>
  <rect x="1000" y="390" width="105" height="50" rx="10" class="boundary"/><text x="1052" y="410" class="boxText" text-anchor="middle">Analysis</text><text x="1052" y="428" class="boxText" text-anchor="middle">frame</text>
  <path d="M385 415 H425" class="thin"/><path d="M510 415 H550" class="thin"/><path d="M655 415 H695" class="thin"/><path d="M800 415 H840" class="thin"/><path d="M960 415 H1000" class="thin"/>
  <text x="690" y="472" class="small" text-anchor="middle">single Analysis worker thread / no internal pipe or queue</text>
  <rect x="900" y="545" width="320" height="115" rx="12" fill="#fff" stroke="#cbd5e1"/><text x="920" y="570" class="label">Legend</text>
  <rect x="920" y="585" width="130" height="30" rx="8" class="filter"/><text x="985" y="605" class="boxText" text-anchor="middle">Filter / component</text>
  <polygon points="1080,585 1190,585 1200,600 1190,615 1080,615 1070,600" class="pipe"/><text x="1135" y="605" class="boxText" text-anchor="middle">Pipe / connector</text>
  <rect x="920" y="625" width="140" height="30" rx="8" class="consumer"/><text x="990" y="645" class="boxText" text-anchor="middle">Display consumer</text>
  <rect x="1070" y="625" width="130" height="30" rx="8" class="stage"/><text x="1135" y="645" class="boxText" text-anchor="middle">Internal sync stage</text>
</svg>
