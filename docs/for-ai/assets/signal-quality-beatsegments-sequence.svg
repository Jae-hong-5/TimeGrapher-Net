<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">AnalysisFrame.BeatSegments Runtime Sequence View</title>
  <desc id="desc">Abstract runtime sequence showing signal quality classified in Core, attached to AnalysisFrame, scheduled on the UI path, and read by presentation consumers.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/></marker>
    <style>text{font-family:Arial,Helvetica,sans-serif;fill:#111827}.title{font-size:24px;font-weight:700}.sub{font-size:12px;fill:#374151}.head{fill:#f3f4f6;stroke:#6b7280;stroke-width:1.3;rx:8}.life{stroke:#9ca3af;stroke-width:1.2;stroke-dasharray:5 5}.msg{stroke:#374151;stroke-width:1.7;fill:none;marker-end:url(#arrow)}.note{fill:#fffbeb;stroke:#d97706;stroke-width:1.2;rx:8}.num{font-size:11px;fill:#6b7280}.msgtext{font-size:12px;fill:#111827}.group{font-size:13px;font-weight:700}</style>
  </defs>
  <rect width="1120" height="520" fill="#ffffff"/>
  <text x="40" y="46" class="title">AnalysisFrame.BeatSegments Runtime Sequence View</text>
  <text x="40" y="72" class="sub">Higher-level flow: quality is computed once in Core, carried by the frame DTO, then read by UI consumers.</text>
  <rect x="55" y="110" width="130" height="46" class="head"/><text x="82" y="138" class="msgtext">Detector metrics</text>
  <rect x="265" y="110" width="145" height="46" class="head"/><text x="288" y="138" class="msgtext">Core analysis</text>
  <rect x="490" y="110" width="145" height="46" class="head"/><text x="509" y="138" class="msgtext">AnalysisFrame</text>
  <rect x="715" y="110" width="145" height="46" class="head"/><text x="738" y="138" class="msgtext">UI scheduler</text>
  <rect x="935" y="110" width="145" height="46" class="head"/><text x="951" y="138" class="msgtext">Presentation</text>
  <line x1="120" y1="156" x2="120" y2="455" class="life"/><line x1="337" y1="156" x2="337" y2="455" class="life"/><line x1="562" y1="156" x2="562" y2="455" class="life"/><line x1="787" y1="156" x2="787" y2="455" class="life"/><line x1="1007" y1="156" x2="1007" y2="455" class="life"/>
  <text x="72" y="205" class="num">1</text><path d="M120 200 L337 200" class="msg"/><text x="166" y="191" class="msgtext">A/C event metrics arrive</text>
  <text x="72" y="260" class="num">2</text><path d="M337 255 C405 235 405 275 337 285" class="msg"/><text x="382" y="253" class="msgtext">Classify beat quality and aggregate flags</text>
  <text x="72" y="325" class="num">3</text><path d="M337 320 L562 320" class="msg"/><text x="382" y="311" class="msgtext">Attach BeatSegmentsSnapshot to frame</text>
  <rect x="402" y="338" width="360" height="42" class="note"/><text x="424" y="364" class="msgtext">AnalysisFrame.BeatSegments is the single DTO handoff point</text>
  <text x="72" y="415" class="num">4</text><path d="M562 410 L787 410" class="msg"/><text x="607" y="401" class="msgtext">Publish latest analysis frame</text>
  <text x="72" y="460" class="num">5</text><path d="M787 455 L1007 455" class="msg"/><text x="830" y="446" class="msgtext">Read same DTO for readout, status, and graph overlays</text>
</svg>
