<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">AnalysisFrame.BeatSegments Runtime Sequence View</title>
  <desc id="desc">Runtime sequence showing signal quality flags stored in BeatSegmentsSnapshot and delivered through AnalysisFrame to readout, status, and graph renderers.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/></marker>
    <style>text{font-family:Arial,Helvetica,sans-serif;fill:#111827}.title{font-size:24px;font-weight:700}.sub{font-size:12px;fill:#374151}.head{fill:#f3f4f6;stroke:#6b7280;stroke-width:1.3;rx:8}.life{stroke:#9ca3af;stroke-width:1.2;stroke-dasharray:5 5}.msg{stroke:#374151;stroke-width:1.6;fill:none;marker-end:url(#arrow)}.note{fill:#fffbeb;stroke:#d97706;stroke-width:1.2;rx:8}.num{font-size:11px;fill:#6b7280}.msgtext{font-size:12px;fill:#111827}</style>
  </defs>
  <rect width="1280" height="820" fill="#ffffff"/>
  <text x="40" y="46" class="title">AnalysisFrame.BeatSegments Runtime Sequence View</text>
  <text x="40" y="72" class="sub">One analysis frame carries the same BeatSegmentsSnapshot to readout, status guidance, and graph consumers.</text>
  <rect x="35" y="105" width="105" height="44" class="head"/><text x="52" y="132" class="msgtext">Detector</text>
  <rect x="170" y="105" width="125" height="44" class="head"/><text x="187" y="132" class="msgtext">BeatSegmentCapture</text>
  <rect x="325" y="105" width="105" height="44" class="head"/><text x="347" y="132" class="msgtext">AnalysisWorker</text>
  <rect x="460" y="105" width="105" height="44" class="head"/><text x="483" y="132" class="msgtext">AnalysisFrame</text>
  <rect x="595" y="105" width="100" height="44" class="head"/><text x="616" y="132" class="msgtext">MainWindow</text>
  <rect x="725" y="105" width="104" height="44" class="head"/><text x="741" y="132" class="msgtext">Scheduler</text>
  <rect x="858" y="105" width="108" height="44" class="head"/><text x="878" y="132" class="msgtext">Readout</text>
  <rect x="996" y="105" width="100" height="44" class="head"/><text x="1020" y="132" class="msgtext">Router</text>
  <rect x="1125" y="105" width="110" height="44" class="head"/><text x="1142" y="132" class="msgtext">Graphs/Status</text>
  <line x1="87" y1="149" x2="87" y2="770" class="life"/><line x1="232" y1="149" x2="232" y2="770" class="life"/><line x1="377" y1="149" x2="377" y2="770" class="life"/><line x1="512" y1="149" x2="512" y2="770" class="life"/><line x1="645" y1="149" x2="645" y2="770" class="life"/><line x1="777" y1="149" x2="777" y2="770" class="life"/><line x1="912" y1="149" x2="912" y2="770" class="life"/><line x1="1046" y1="149" x2="1046" y2="770" class="life"/><line x1="1180" y1="149" x2="1180" y2="770" class="life"/>
  <text x="48" y="184" class="num">1</text><path d="M87 180 L232 180" class="msg"/><text x="105" y="171" class="msgtext">DetectorMetricsBlockUpdate with A/C events</text>
  <text x="48" y="224" class="num">2</text><path d="M232 220 C275 205 275 235 232 240" class="msg"/><text x="255" y="218" class="msgtext">complete beat segment</text>
  <text x="48" y="274" class="num">3</text><path d="M232 270 C283 252 283 286 232 292" class="msg"/><text x="255" y="268" class="msgtext">ClassifyQuality()</text>
  <text x="48" y="324" class="num">4</text><path d="M232 320 C282 303 282 337 232 342" class="msg"/><text x="255" y="318" class="msgtext">store BeatSegment.Quality</text>
  <text x="48" y="374" class="num">5</text><path d="M377 370 L232 370" class="msg"/><text x="247" y="361" class="msgtext">AppendSnapshot(frame)</text>
  <text x="48" y="424" class="num">6</text><path d="M232 420 L512 420" class="msg"/><text x="283" y="411" class="msgtext">frame.BeatSegments = CurrentSnapshot()</text>
  <rect x="315" y="438" width="395" height="48" class="note"/><text x="335" y="466" class="msgtext">Snapshot carries Segments, Markers, Average, and ORed Quality flags</text>
  <text x="48" y="524" class="num">7</text><path d="M377 520 L645 520" class="msg"/><text x="431" y="511" class="msgtext">AnalysisFrameReady(frame)</text>
  <text x="48" y="564" class="num">8</text><path d="M645 560 L777 560" class="msg"/><text x="672" y="551" class="msgtext">Enqueue(frame)</text>
  <text x="48" y="604" class="num">9</text><path d="M777 600 L645 600" class="msg"/><text x="665" y="591" class="msgtext">HandleAnalysisFrame()</text>
  <text x="42" y="644" class="num">10</text><path d="M645 640 L912 640" class="msg"/><text x="710" y="631" class="msgtext">UpdateResults(frame), read Quality</text>
  <text x="42" y="684" class="num">11</text><path d="M645 680 L1046 680" class="msg"/><text x="742" y="671" class="msgtext">Route(frame): Observe all, Render active tab</text>
  <text x="42" y="724" class="num">12</text><path d="M1046 720 L1180 720" class="msg"/><text x="1063" y="711" class="msgtext">graphs read BeatSegments / segment Quality</text>
  <text x="42" y="764" class="num">13</text><path d="M645 760 L1180 760" class="msg"/><text x="790" y="751" class="msgtext">Present(frame): status guidance reads BeatSegments.Quality</text>
</svg>
