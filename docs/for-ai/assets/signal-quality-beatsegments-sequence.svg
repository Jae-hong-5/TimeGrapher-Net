<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-labelledby="title desc">
  <title id="title">AnalysisFrame Runtime Payload Sequence View</title>
  <desc id="desc">Abstract runtime sequence showing Core analysis attaching multiple payload groups to AnalysisFrame, including BeatSegmentsSnapshot for signal quality, before UI presentation consumes them.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/></marker>
    <style>text{font-family:Arial,Helvetica,sans-serif;fill:#111827}.title{font-size:24px;font-weight:700}.sub{font-size:12px;fill:#374151}.head{fill:#f3f4f6;stroke:#6b7280;stroke-width:1.3;rx:8}.life{stroke:#9ca3af;stroke-width:1.2;stroke-dasharray:5 5}.msg{stroke:#374151;stroke-width:1.7;fill:none;marker-end:url(#arrow)}.note{fill:#fffbeb;stroke:#d97706;stroke-width:1.2;rx:8}.payload{fill:#ecfdf5;stroke:#059669;stroke-width:1.2;rx:8}.num{font-size:11px;fill:#6b7280}.msgtext{font-size:12px;fill:#111827}.box-title{font-size:13px;font-weight:700}.box-sub{font-size:11px;fill:#374151}</style>
  </defs>
  <rect width="1180" height="560" fill="#ffffff"/>
  <text x="40" y="46" class="title">AnalysisFrame Runtime Payload Sequence View</text>
  <text x="40" y="72" class="sub">AnalysisFrame carries one consistent UI update: signal quality is one payload group, delivered with metrics, graphs, images, and runtime state.</text>
  <rect x="55" y="110" width="130" height="46" class="head"/><text x="82" y="138" class="msgtext">Detector metrics</text>
  <rect x="265" y="110" width="145" height="46" class="head"/><text x="288" y="138" class="msgtext">Core analysis</text>
  <rect x="490" y="110" width="170" height="46" class="head"/><text x="525" y="138" class="msgtext">AnalysisFrame</text>
  <rect x="740" y="110" width="145" height="46" class="head"/><text x="763" y="138" class="msgtext">UI scheduler</text>
  <rect x="960" y="110" width="145" height="46" class="head"/><text x="976" y="138" class="msgtext">Presentation</text>
  <line x1="120" y1="156" x2="120" y2="490" class="life"/><line x1="337" y1="156" x2="337" y2="490" class="life"/><line x1="575" y1="156" x2="575" y2="490" class="life"/><line x1="812" y1="156" x2="812" y2="490" class="life"/><line x1="1032" y1="156" x2="1032" y2="490" class="life"/>
  <text x="72" y="205" class="num">1</text><path d="M120 200 L337 200" class="msg"/><text x="166" y="191" class="msgtext">A/C event metrics arrive</text>
  <text x="72" y="260" class="num">2</text><path d="M337 255 C405 235 405 275 337 285" class="msg"/><text x="382" y="253" class="msgtext">Classify beat quality and build UI payloads</text>
  <text x="72" y="330" class="num">3</text><path d="M337 325 L575 325" class="msg"/><text x="388" y="316" class="msgtext">Publish one AnalysisFrame</text>
  <rect x="410" y="342" width="390" height="98" class="payload"/>
  <text x="430" y="366" class="box-title">Representative frame payloads</text>
  <text x="430" y="386" class="box-sub">BeatSegmentsSnapshot: recent beat windows and signal-quality flags</text>
  <text x="430" y="404" class="box-sub">WatchMetricsUpdate + BeatMetricsHistorySnapshot: results, rate, amplitude, beat error</text>
  <text x="430" y="422" class="box-sub">GraphSeries + markers + SoundImage/SpectrogramImage + runtime stats</text>
  <text x="72" y="485" class="num">4</text><path d="M575 480 L812 480" class="msg"/><text x="630" y="471" class="msgtext">Coalesce latest frame for UI thread</text>
  <text x="72" y="525" class="num">5</text><path d="M812 520 L1032 520" class="msg"/><text x="855" y="511" class="msgtext">Render readout, status, graphs, and overlays from the same frame</text>
</svg>
