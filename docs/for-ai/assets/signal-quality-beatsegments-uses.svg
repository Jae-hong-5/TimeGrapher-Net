<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="760" viewBox="0 0 1260 760" role="img" aria-labelledby="title desc">
  <title id="title">AnalysisFrame.BeatSegments Uses View</title>
  <desc id="desc">Static code-level uses and read-only DTO consumption for BeatSegmentsSnapshot and SignalQualityFlags.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/></marker>
    <style>text{font-family:Arial,Helvetica,sans-serif;fill:#111827}.title{font-size:24px;font-weight:700}.group-title{font-size:18px;font-weight:700}.box-title{font-size:15px;font-weight:700}.box-sub{font-size:12px;fill:#374151}.group{fill:#f9fafb;stroke:#9ca3af;stroke-width:1.5;rx:18}.core{fill:#e0f2fe;stroke:#0284c7}.shared{fill:#ecfdf5;stroke:#059669}.app{fill:#fff7ed;stroke:#ea580c}.text{fill:#f5f3ff;stroke:#7c3aed}.edge{stroke:#374151;stroke-width:1.8;fill:none;marker-end:url(#arrow)}.edge-light{stroke:#6b7280;stroke-width:1.5;fill:none;marker-end:url(#arrow);stroke-dasharray:5 4}</style>
