<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="780" viewBox="0 0 1280 780">
  <rect width="1280" height="780" fill="#e4e5e7"/>
  <text x="56" y="58" font-family="Inter, Segoe UI, sans-serif" font-size="28" font-weight="700" fill="#111827">Value Readout Proposal</text>
  <text x="56" y="90" font-family="Inter, Segoe UI, sans-serif" font-size="15" fill="#4b5563">Same data, softer hierarchy: smaller label, larger value, separated unit, semantic accent only where it helps judgment.</text>

  <g transform="translate(56 128)">
    <rect width="552" height="258" rx="8" fill="#f7f8fa" stroke="#c5c8cc"/>
    <text x="24" y="36" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#111827">Beat Error / Escapement</text>
    <text x="24" y="70" font-family="Consolas, monospace" font-size="14" fill="#6b7280">current</text>
    <text x="24" y="104" font-family="Consolas, monospace" font-size="15" fill="#111827">Error Rate</text>
    <text x="24" y="134" font-family="Consolas, monospace" font-size="22" font-weight="700" fill="#111827">-0.4 s/d</text>
    <text x="178" y="104" font-family="Consolas, monospace" font-size="15" fill="#111827">Amplitude</text>
    <text x="178" y="134" font-family="Consolas, monospace" font-size="22" font-weight="700" fill="#111827">301 deg</text>
    <text x="330" y="104" font-family="Consolas, monospace" font-size="15" fill="#111827">Beat Error</text>
    <text x="330" y="134" font-family="Consolas, monospace" font-size="22" font-weight="700" fill="#111827">+0.01 ms</text>

    <text x="24" y="178" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#6b7280">proposed</text>
    <g transform="translate(24 194)">
      <rect width="145" height="44" rx="6" fill="#ffffff" stroke="#d1d5db"/>
