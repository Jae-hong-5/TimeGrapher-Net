      <text x="12" y="34" font-family="Consolas, monospace" font-size="21" font-weight="700" fill="#111827">-0.4</text>
      <text x="96" y="34" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6b7280">s/d</text>
    </g>
    <g transform="translate(185 194)">
      <rect width="145" height="44" rx="6" fill="#ffffff" stroke="#d1d5db"/>
      <text x="12" y="16" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6b7280">Amplitude</text>
      <text x="12" y="34" font-family="Consolas, monospace" font-size="21" font-weight="700" fill="#b45309">301</text>
      <text x="88" y="34" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6b7280">deg</text>
    </g>
    <g transform="translate(346 194)">
      <rect width="170" height="44" rx="6" fill="#ffffff" stroke="#d1d5db"/>
      <text x="12" y="16" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6b7280">Beat Error</text>
      <text x="12" y="34" font-family="Consolas, monospace" font-size="21" font-weight="700" fill="#111827">+0.01</text>
      <text x="108" y="34" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6b7280">ms</text>
    </g>
  </g>

  <g transform="translate(672 128)">
    <rect width="552" height="258" rx="8" fill="#f7f8fa" stroke="#c5c8cc"/>
    <text x="24" y="36" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#111827">Sweep / Beat Noise Bottom Readout</text>
    <text x="24" y="70" font-family="Consolas, monospace" font-size="14" fill="#6b7280">current</text>
    <text x="24" y="106" font-family="Consolas, monospace" font-size="16" fill="#111827">Inst. Rate +0.3 s/d  |  Inst. Amp 301 deg  |  Inst. Beat Err -0.02 ms</text>
    <text x="24" y="154" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#6b7280">proposed</text>
    <g transform="translate(24 172)">
      <rect width="504" height="52" rx="6" fill="#ffffff" stroke="#d1d5db"/>
      <line x1="168" y1="10" x2="168" y2="42" stroke="#e5e7eb"/>
      <line x1="336" y1="10" x2="336" y2="42" stroke="#e5e7eb"/>
      <text x="16" y="20" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6b7280">Inst. Rate</text>
      <text x="16" y="40" font-family="Consolas, monospace" font-size="21" font-weight="700" fill="#111827">+0.3 <tspan font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6b7280">s/d</tspan></text>
      <text x="184" y="20" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6b7280">Inst. Amp</text>
      <text x="184" y="40" font-family="Consolas, monospace" font-size="21" font-weight="700" fill="#111827">301 <tspan font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6b7280">deg</tspan></text>
      <text x="352" y="20" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6b7280">Inst. Beat Err</text>
      <text x="352" y="40" font-family="Consolas, monospace" font-size="21" font-weight="700" fill="#111827">-0.02 <tspan font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6b7280">ms</tspan></text>
    </g>
  </g>

  <g transform="translate(56 430)">
    <rect width="552" height="258" rx="8" fill="#f7f8fa" stroke="#c5c8cc"/>
    <text x="24" y="36" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#111827">Waveforms Direction Marker</text>
    <text x="24" y="72" font-family="Consolas, monospace" font-size="16" fill="#111827">past          &lt;          current</text>
    <text x="24" y="122" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#6b7280">proposed</text>
    <g transform="translate(24 144)">
      <rect width="504" height="72" rx="6" fill="#ffffff" stroke="#d1d5db"/>
      <line x1="54" y1="36" x2="450" y2="36" stroke="#c7cbd1" stroke-width="2"/>
      <circle cx="54" cy="36" r="5" fill="#9ca3af"/>
      <circle cx="450" cy="36" r="7" fill="#d90429"/>
      <text x="28" y="62" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#6b7280">Past</text>
      <text x="404" y="62" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#111827">Current</text>
    </g>
  </g>

  <g transform="translate(672 430)">
    <rect width="552" height="258" rx="8" fill="#f7f8fa" stroke="#c5c8cc"/>
    <text x="24" y="36" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#111827">Sound Print / Spectrogram Add-on Info</text>
    <text x="24" y="72" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#6b7280">Keep the graph primary, add lightweight context that answers what changed.</text>
    <g transform="translate(24 100)">
      <rect width="504" height="116" rx="6" fill="#ffffff" stroke="#d1d5db"/>
      <text x="18" y="30" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#111827">Suggested overlays</text>
      <text x="18" y="58" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#374151">Peak band, noise floor, dominant frequency, live-head marker</text>
      <text x="18" y="86" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#374151">Beat count / time window / dB range summarized in one compact strip</text>
    </g>
  </g>
